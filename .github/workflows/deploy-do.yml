name: Deploy Library with Docker Compose

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on droplet via docker compose
        uses: appleboy/ssh-action@v1.2.0
        env:
          REPO_URL: https://github.com/rnoonegen/Library-Management-System.git
          APP_DIR: /var/www/library-management-system
          CLIENT_URL: http://139.59.6.209:5002
          REACT_APP_API_URL: http://139.59.6.209:5003/api
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: 15m
          TRUST_PROXY: "false"
          DB_PROFILE: online
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_SSL: "true"
          DB_SSL_REJECT_UNAUTHORIZED: "false"
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
          COOKIE_SECURE: "false"
          COOKIE_SAME_SITE: lax
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: REPO_URL,APP_DIR,CLIENT_URL,REACT_APP_API_URL,JWT_SECRET,JWT_EXPIRES_IN,TRUST_PROXY,DB_PROFILE,DATABASE_URL,DB_SSL,DB_SSL_REJECT_UNAUTHORIZED,SEED_ADMIN_PASSWORD,COOKIE_SECURE,COOKIE_SAME_SITE
          script: |
            set -e

            mkdir -p /var/www
            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main

            cat > .env.library <<EOF
            CLIENT_URL=$CLIENT_URL
            REACT_APP_API_URL=$REACT_APP_API_URL
            JWT_SECRET=$JWT_SECRET
            JWT_EXPIRES_IN=$JWT_EXPIRES_IN
            TRUST_PROXY=$TRUST_PROXY
            DB_PROFILE=$DB_PROFILE
            DATABASE_URL=$DATABASE_URL
            DB_SSL=$DB_SSL
            DB_SSL_REJECT_UNAUTHORIZED=$DB_SSL_REJECT_UNAUTHORIZED
            SEED_ADMIN_PASSWORD=$SEED_ADMIN_PASSWORD
            COOKIE_SECURE=$COOKIE_SECURE
            COOKIE_SAME_SITE=$COOKIE_SAME_SITE
            EOF

            docker compose --env-file .env.library -f docker-compose.library.yml up -d --build
            docker compose --env-file .env.library -f docker-compose.library.yml ps
