# Nginx inside Docker — single port for IP deploy
# UI:  http://DROPLET_IP:5000
# API: http://DROPLET_IP:5000/api

upstream library_backend {
    server backend:5000;
}

upstream library_frontend {
    server frontend:80;
}

server {
    listen 5000;
    server_name _;

    client_max_body_size 1m;

    location /api/ {
        proxy_pass http://library_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://library_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
