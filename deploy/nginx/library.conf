# Host Nginx reverse proxy for Library Management System
# Copy to: /etc/nginx/sites-available/library
# Replace YOUR_DOMAIN with your actual domain before enabling.

upstream library_backend {
    server 127.0.0.1:5000;
    keepalive 16;
}

upstream library_frontend {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    client_max_body_size 1m;

    # API — proxy to Express backend
    location /api/ {
        proxy_pass http://library_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # React SPA — proxy to frontend container
    location / {
        proxy_pass http://library_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# After HTTP works, run:
#   sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
# Certbot will add HTTPS server blocks and HTTP→HTTPS redirects automatically.
