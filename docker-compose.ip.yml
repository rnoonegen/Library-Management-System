# Library app on a single port (fits alongside other apps on 3000 and 4000)
#
# GurukulamHub:    http://139.59.6.209:3000  (unchanged)
# Valmiki Ashram:  http://139.59.6.209:4000  (unchanged)
# Library System:  http://139.59.6.209:5000  (this app)
#
# Usage:
#   docker compose -f docker-compose.ip.yml up -d --build

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: library-backend
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5000/api/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    container_name: library-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  proxy:
    image: nginx:1.27-alpine
    container_name: library-proxy
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./deploy/nginx/library-ip.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
