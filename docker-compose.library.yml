# Library Management System — same pattern as Valmiki Ashram docker-compose.valmiki.yml
#
# GurukulamHub:    http://139.59.6.209:3000  (unchanged)
# Valmiki client:  http://139.59.6.209:4000  (unchanged)
# Valmiki API:     http://139.59.6.209:5000  (unchanged)
# Library client:  http://139.59.6.209:5002  (this app — React)
# Library API:     http://139.59.6.209:5003  (this app — Node/Express)
#
# Usage:
#   docker compose --env-file .env.library -f docker-compose.library.yml up -d --build

services:
  server:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: library-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      CORS_ORIGINS: ${CLIENT_URL:-http://139.59.6.209:5002}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      DB_PROFILE: ${DB_PROFILE:-online}
      DATABASE_URL: ${DATABASE_URL}
      DB_SSL: ${DB_SSL:-true}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED:-false}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    ports:
      - "5003:5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5000/api/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  client:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://139.59.6.209:5003/api}
    container_name: library-client
    restart: unless-stopped
    ports:
      - "5002:80"
    depends_on:
      server:
        condition: service_healthy

volumes: {}
